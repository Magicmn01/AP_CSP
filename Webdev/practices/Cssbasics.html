<!DOCTYPE html>
<html lang="en">
    <head>
        <title> Color theory</title>
        <meta charset="UTF-8">
        <style>
                .comp{height: 200px; width: 300px; background-color: blue; color: orange;}
                .analog{height: 200px; width: 300px; border: 10px,dashed,#E27822; color: #E2D822; background-color: #E2222C;}
                .triadic{height: 200px; width: 300px; border: 10px,solid,#EFDB15; color: #15EFDB; background-color:#DB15EF;}
        </style>
    </head>
    <body>
        <div class="comp">
        <h1 > This is complementary</h1>
    </div>
        <div class="analog"> 
    <h1 > This is analogous</h1>
    </div>
        <div class="triadic">  
    <h1> This is triadic</h1>
    </div>
    </body>
</html>
